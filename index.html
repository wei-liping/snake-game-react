<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇小游戏</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
      padding-bottom: 120px;
    }
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    h1 {
      color: #4ade80;
      font-size: 2.5rem;
      text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
    }
    .score {
      color: #fbbf24;
      font-size: 1.5rem;
      font-weight: bold;
    }
    .game-board {
      display: grid;
      background-color: #0f172a;
      border: 4px solid #334155;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }
    .cell {
      border: 1px solid #1e293b;
    }
    .snake {
      background-color: #22c55e;
      border-radius: 4px;
      box-shadow: 0 0 5px rgba(34, 197, 94, 0.8);
    }
    .snake-head {
      background-color: #16a34a;
    }
    .food {
      background-color: #ef4444;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.8);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    .controls {
      color: #94a3b8;
      font-size: 0.9rem;
    }
    .controls p { margin: 5px 0; }
    .game-over, .paused {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(15, 23, 42, 0.95);
      padding: 40px 60px;
      border-radius: 16px;
      border: 2px solid #334155;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
      z-index: 2000;
    }
    .game-over h2 { color: #ef4444; font-size: 2rem; margin-bottom: 20px; }
    .paused h2 { color: #fbbf24; font-size: 2rem; margin-bottom: 20px; }
    .game-over p { color: #fff; font-size: 1.2rem; margin-bottom: 20px; }
    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 12px 32px;
      font-size: 1.1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: bold;
    }
    button:hover {
      background: #16a34a;
      transform: scale(1.05);
    }
    .speed-controls {
      display: flex;
      gap: 10px;
      margin-top: 10px;
      margin-bottom: 20px;
    }
    .speed-btn {
      padding: 8px 16px;
      font-size: 0.9rem;
      background: rgba(34, 197, 94, 0.2);
      border: 2px solid #22c55e;
      color: #22c55e;
    }
    .speed-btn.active {
      background: #22c55e;
      color: white;
    }
    .speed-display {
      color: #fbbf24;
      font-size: 1rem;
      margin-top: 10px;
      margin-bottom: 10px;
    }
    .mobile-controls {
      display: flex;
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      gap: 8px;
      z-index: 1000;
    }
    .control-btn {
      width: 50px;
      height: 50px;
      background: rgba(59, 130, 246, 0.3);
      border: 2px solid #3b82f6;
      border-radius: 12px;
      color: #3b82f6;
      font-size: 1.3rem;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: all 0.2s;
    }
    .control-btn:active {
      background: rgba(59, 130, 246, 0.6);
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="game-container">
    <h1>贪吃蛇</h1>
    <div class="score">分数：<span id="score-value">0</span></div>
    
    <div 
      id="game-board"
      class="game-board"
    ></div>

    <div class="controls">
      <p>方向键 或 WASD 控制移动</p>
      <p>空格键 暂停/继续</p>
    </div>
  </div>
  
  <div class="speed-display">速度：<span id="speed-value">中速</span></div>
  <div class="speed-controls">
    <button class="speed-btn" id="btn-slow">慢速</button>
    <button class="speed-btn active" id="btn-medium">中速</button>
    <button class="speed-btn" id="btn-fast">快速</button>
  </div>

  <!-- 移动端控制按钮 -->
  <div class="mobile-controls">
    <button class="control-btn" id="btn-up">↑</button>
    <div style="display: flex; gap: 10px;">
      <button class="control-btn" id="btn-left">←</button>
      <button class="control-btn" id="btn-down">↓</button>
      <button class="control-btn" id="btn-right">→</button>
    </div>
  </div>

  <div id="game-over" class="game-over" style="display: none;">
    <h2>游戏结束!</h2>
    <p>最终得分：<span id="final-score">0</span></p>
    <button onclick="resetGame()">重新开始</button>
  </div>

  <div id="paused" class="paused" style="display: none;">
    <h2>暂停</h2>
    <button onclick="togglePause()">继续</button>
  </div>
  
  <script>
    const GRID_SIZE = 20;
    const CELL_SIZE = 20;
    const SPEEDS = {
      slow: 300,
      medium: 150,
      fast: 80
    };
    let currentSpeed = 'medium';
    let snake = [{ x: 10, y: 10 }];
    let food = { x: 15, y: 15 };
    let direction = { x: 0, y: -1 };
    let nextDirection = { x: 0, y: -1 };
    let score = 0;
    let gameOver = false;
    let isPaused = false;
    let gameLoop = null;

    function createBoard() {
      const board = document.getElementById('game-board');
      board.style.width = GRID_SIZE * CELL_SIZE + 'px';
      board.style.height = GRID_SIZE * CELL_SIZE + 'px';
      board.style.gridTemplateColumns = `repeat(${GRID_SIZE}, ${CELL_SIZE}px)`;
      
      board.innerHTML = '';
      for (let i = 0; i < GRID_SIZE * GRID_SIZE; i++) {
        const cell = document.createElement('div');
        cell.className = 'cell';
        cell.style.width = CELL_SIZE + 'px';
        cell.style.height = CELL_SIZE + 'px';
        board.appendChild(cell);
      }
    }

    function render() {
      const cells = document.querySelectorAll('.cell');
      cells.forEach((cell, index) => {
        const x = index % GRID_SIZE;
        const y = Math.floor(index / GRID_SIZE);
        cell.className = 'cell';
        
        const isSnake = snake.some(segment => segment.x === x && segment.y === y);
        const isHead = snake[0].x === x && snake[0].y === y;
        const isFood = food.x === x && food.y === y;

        if (isHead) {
          cell.classList.add('snake', 'snake-head');
        } else if (isSnake) {
          cell.classList.add('snake');
        } else if (isFood) {
          cell.classList.add('food');
        }
      });
      
      document.getElementById('score-value').textContent = score;
    }

    function generateFood() {
      let newFood;
      let isOnSnake;
      do {
        newFood = {
          x: Math.floor(Math.random() * GRID_SIZE),
          y: Math.floor(Math.random() * GRID_SIZE)
        };
        isOnSnake = snake.some(
          segment => segment.x === newFood.x && segment.y === newFood.y
        );
      } while (isOnSnake);
      return newFood;
    }

    function checkCollision(head) {
      if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
        return true;
      }
      for (let i = 0; i < snake.length - 1; i++) {
        if (snake[i].x === head.x && snake[i].y === head.y) {
          return true;
        }
      }
      return false;
    }

    function moveSnake() {
      if (gameOver || isPaused) return;

      direction = nextDirection;
      const head = snake[0];
      const newHead = {
        x: head.x + direction.x,
        y: head.y + direction.y
      };

      if (checkCollision(newHead)) {
        gameOver = true;
        document.getElementById('final-score').textContent = score;
        document.getElementById('game-over').style.display = 'block';
        return;
      }

      snake = [newHead, ...snake];

      if (newHead.x === food.x && newHead.y === food.y) {
        score += 10;
        food = generateFood();
      } else {
        snake.pop();
      }

      render();
    }

    function startGame() {
      if (gameLoop) clearInterval(gameLoop);
      gameLoop = setInterval(moveSnake, SPEEDS[currentSpeed]);
    }

    function setSpeed(speed) {
      currentSpeed = speed;
      document.getElementById('speed-value').textContent = 
        speed === 'slow' ? '慢速' : speed === 'medium' ? '中速' : '快速';
      
      document.querySelectorAll('.speed-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById('btn-' + speed).classList.add('active');
      
      if (!gameOver && !isPaused) {
        startGame();
      }
    }

    function resetGame() {
      snake = [{ x: 10, y: 10 }];
      food = { x: 15, y: 15 };
      direction = { x: 0, y: -1 };
      nextDirection = { x: 0, y: -1 };
      score = 0;
      gameOver = false;
      isPaused = false;
      document.getElementById('game-over').style.display = 'none';
      document.getElementById('paused').style.display = 'none';
      createBoard();
      render();
      startGame();
    }

    function togglePause() {
      if (gameOver) return;
      isPaused = !isPaused;
      document.getElementById('paused').style.display = isPaused ? 'block' : 'none';
    }

    function changeDirection(x, y) {
      if (direction.x !== -x || direction.y !== -y) {
        nextDirection = { x, y };
      }
    }

    // 键盘控制
    document.addEventListener('keydown', (e) => {
      if (gameOver) return;

      if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
        e.preventDefault();
        togglePause();
        return;
      }

      if (isPaused) return;

      switch (e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
          changeDirection(0, -1);
          break;
        case 'ArrowDown':
        case 's':
        case 'S':
          changeDirection(0, 1);
          break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
          changeDirection(-1, 0);
          break;
        case 'ArrowRight':
        case 'd':
        case 'D':
          changeDirection(1, 0);
          break;
      }
    });

    // 移动端按钮控制
    document.getElementById('btn-up').addEventListener('click', () => changeDirection(0, -1));
    document.getElementById('btn-left').addEventListener('click', () => changeDirection(-1, 0));
    document.getElementById('btn-down').addEventListener('click', () => changeDirection(0, 1));
    document.getElementById('btn-right').addEventListener('click', () => changeDirection(1, 0));

    // 速度控制按钮
    document.getElementById('btn-slow').addEventListener('click', () => setSpeed('slow'));
    document.getElementById('btn-medium').addEventListener('click', () => setSpeed('medium'));
    document.getElementById('btn-fast').addEventListener('click', () => setSpeed('fast'));

    // 初始化游戏
    createBoard();
    render();
    startGame();
  </script>
</body>
</html>
