<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>贪吃蛇小游戏</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    #root {
      text-align: center;
    }
    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    h1 {
      color: #4ade80;
      font-size: 2.5rem;
      text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
    }
    .score {
      color: #fbbf24;
      font-size: 1.5rem;
      font-weight: bold;
    }
    .game-board {
      display: grid;
      background-color: #0f172a;
      border: 4px solid #334155;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
    }
    .cell {
      border: 1px solid #1e293b;
    }
    .snake {
      background-color: #22c55e;
      border-radius: 4px;
      box-shadow: 0 0 5px rgba(34, 197, 94, 0.8);
    }
    .snake-head {
      background-color: #16a34a;
    }
    .food {
      background-color: #ef4444;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(239, 68, 68, 0.8);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.2); }
    }
    .controls {
      color: #94a3b8;
      font-size: 0.9rem;
    }
    .controls p { margin: 5px 0; }
    .game-over, .paused {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(15, 23, 42, 0.95);
      padding: 40px 60px;
      border-radius: 16px;
      border: 2px solid #334155;
      box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
    }
    .game-over h2 { color: #ef4444; font-size: 2rem; margin-bottom: 20px; }
    .paused h2 { color: #fbbf24; font-size: 2rem; margin-bottom: 20px; }
    .game-over p { color: #fff; font-size: 1.2rem; margin-bottom: 20px; }
    button {
      background: #22c55e;
      color: white;
      border: none;
      padding: 12px 32px;
      font-size: 1.1rem;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
      font-weight: bold;
    }
    button:hover {
      background: #16a34a;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const GRID_SIZE = 20;
    const CELL_SIZE = 20;

    function App() {
      const [snake, setSnake] = useState([{ x: 10, y: 10 }]);
      const [food, setFood] = useState({ x: 15, y: 15 });
      const [direction, setDirection] = useState({ x: 0, y: -1 });
      const [score, setScore] = useState(0);
      const [gameOver, setGameOver] = useState(false);
      const [isPaused, setIsPaused] = useState(false);

      const generateFood = useCallback(() => {
        let newFood;
        let isOnSnake;
        do {
          newFood = {
            x: Math.floor(Math.random() * GRID_SIZE),
            y: Math.floor(Math.random() * GRID_SIZE)
          };
          isOnSnake = snake.some(
            segment => segment.x === newFood.x && segment.y === newFood.y
          );
        } while (isOnSnake);
        return newFood;
      }, [snake]);

      const resetGame = () => {
        setSnake([{ x: 10, y: 10 }]);
        setFood(generateFood());
        setDirection({ x: 0, y: -1 });
        setScore(0);
        setGameOver(false);
        setIsPaused(false);
      };

      const checkCollision = (head) => {
        if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE) {
          return true;
        }
        for (let i = 0; i < snake.length - 1; i++) {
          if (snake[i].x === head.x && snake[i].y === head.y) {
            return true;
          }
        }
        return false;
      };

      useEffect(() => {
        if (gameOver || isPaused) return;

        const moveSnake = setInterval(() => {
          setSnake(prevSnake => {
            const head = prevSnake[0];
            const newHead = {
              x: head.x + direction.x,
              y: head.y + direction.y
            };

            if (checkCollision(newHead)) {
              setGameOver(true);
              return prevSnake;
            }

            const newSnake = [newHead, ...prevSnake];

            if (newHead.x === food.x && newHead.y === food.y) {
              setScore(prev => prev + 10);
              setFood(generateFood());
            } else {
              newSnake.pop();
            }

            return newSnake;
          });
        }, 150);

        return () => clearInterval(moveSnake);
      }, [direction, food, gameOver, isPaused, generateFood, snake]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (gameOver) return;

          if (e.key === ' ' || e.key === 'p' || e.key === 'P') {
            setIsPaused(prev => !prev);
            return;
          }

          if (isPaused) return;

          switch (e.key) {
            case 'ArrowUp':
            case 'w':
            case 'W':
              if (direction.y !== 1) setDirection({ x: 0, y: -1 });
              break;
            case 'ArrowDown':
            case 's':
            case 'S':
              if (direction.y !== -1) setDirection({ x: 0, y: 1 });
              break;
            case 'ArrowLeft':
            case 'a':
            case 'A':
              if (direction.x !== 1) setDirection({ x: -1, y: 0 });
              break;
            case 'ArrowRight':
            case 'd':
            case 'D':
              if (direction.x !== -1) setDirection({ x: 1, y: 0 });
              break;
            default:
              break;
          }
        };

        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [direction, gameOver, isPaused]);

      return (
        <div className="game-container">
          <h1>贪吃蛇</h1>
          <div className="score">分数: {score}</div>
          
          <div 
            className="game-board"
            style={{
              width: GRID_SIZE * CELL_SIZE,
              height: GRID_SIZE * CELL_SIZE,
              gridTemplateColumns: `repeat(${GRID_SIZE}, ${CELL_SIZE}px)`
            }}
          >
            {Array.from({ length: GRID_SIZE * GRID_SIZE }).map((_, index) => {
              const x = index % GRID_SIZE;
              const y = Math.floor(index / GRID_SIZE);
              const isSnake = snake.some(segment => segment.x === x && segment.y === y);
              const isHead = snake[0].x === x && snake[0].y === y;
              const isFood = food.x === x && food.y === y;

              return (
                <div
                  key={index}
                  className={`cell ${isSnake ? 'snake' : ''} ${isHead ? 'snake-head' : ''} ${isFood ? 'food' : ''}`}
                  style={{ width: CELL_SIZE, height: CELL_SIZE }}
                />
              );
            })}
          </div>

          <div className="controls">
            <p>方向键 或 WASD 控制移动</p>
            <p>空格键 暂停/继续</p>
          </div>

          {gameOver && (
            <div className="game-over">
              <h2>游戏结束!</h2>
              <p>最终得分: {score}</p>
              <button onClick={resetGame}>重新开始</button>
            </div>
          )}

          {isPaused && !gameOver && (
            <div className="paused">
              <h2>暂停</h2>
              <button onClick={() => setIsPaused(false)}>继续</button>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
